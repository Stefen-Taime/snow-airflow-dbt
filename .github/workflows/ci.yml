name: dbt CI

on:
  pull_request:
    branches: [main]
    paths:
      - "astro-project/**"
      - ".github/workflows/ci.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DBT_PROJECT_DIR: astro-project/include/dbt_project
  DBT_PROFILES_DIR: astro-project/include/dbt_project
  SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
  SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
  SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
  SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
  SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
  SNOWFLAKE_DATABASE: ANALYTICS

jobs:
  lint:
    name: SQLFluff Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install SQLFluff
        run: pip install sqlfluff sqlfluff-templater-dbt

      - name: SQLFluff Lint
        run: |
          sqlfluff lint ${{ env.DBT_PROJECT_DIR }}/models/ \
            --config ${{ env.DBT_PROJECT_DIR }}/.sqlfluff

  build-and-test:
    name: dbt Build & Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dbt
        run: pip install dbt-snowflake

      - name: dbt deps
        working-directory: ${{ env.DBT_PROJECT_DIR }}
        run: dbt deps

      - name: dbt build
        working-directory: ${{ env.DBT_PROJECT_DIR }}
        run: |
          dbt build \
            --select state:modified+ \
            --defer \
            --state target-base/ \
            --profiles-dir . \
            --project-dir .
        continue-on-error: false

      - name: dbt_project_evaluator
        working-directory: ${{ env.DBT_PROJECT_DIR }}
        run: |
          dbt test \
            --select package:dbt_project_evaluator \
            --profiles-dir . \
            --project-dir .
        continue-on-error: true

  dag-validation:
    name: Airflow DAG Validation
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}/astro-project/include
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Airflow + providers
        run: |
          pip install "apache-airflow==3.0.1" \
            "apache-airflow-providers-snowflake>=6.3.0" \
            "requests" \
            --constraint "https://raw.githubusercontent.com/apache/airflow/constraints-3.0.1/constraints-3.12.txt"

      - name: Validate DAG syntax
        run: |
          python -c "
          import sys, importlib.util
          for dag_file in ['astro-project/dags/tlc_raw_ingestion.py', 'astro-project/dags/tlc_dbt_transform.py']:
              spec = importlib.util.spec_from_file_location('dag', dag_file)
              mod = importlib.util.module_from_spec(spec)
              try:
                  spec.loader.exec_module(mod)
                  print(f'OK: {dag_file}')
              except Exception as e:
                  print(f'FAIL: {dag_file} -> {e}')
                  sys.exit(1)
          "

  notify-failure:
    name: Slack Notification (CI Failure)
    runs-on: ubuntu-latest
    needs: [lint, build-and-test, dag-validation]
    if: failure()
    steps:
      - uses: ravsamhq/notify-slack-action@2.5.0
        with:
          status: failure
          notification_title: ":x: CI Failed — {repo}"
          message_format: >-
            :warning: *{workflow}* failed on `{branch}` by *{author}*

            Failed job(s): *{failed_jobs}*

            <{run_url}|View workflow run>
          footer: "snow-airflow-dbt CI/CD Pipeline"
          notify_when: "failure"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
