name: Astronomer CD

on:
  push:
    branches: [main]
    paths:
      - "astro-project/**"
      - ".github/workflows/cd.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  ASTRO_API_TOKEN: ${{ secrets.ASTRO_API_TOKEN }}

jobs:
  deploy:
    name: Deploy to Astronomer Cloud
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Astro CLI
        run: curl -sSL install.astronomer.io | sudo bash -s

      - name: Authenticate to Astronomer
        run: astro context switch astronomer.astronomer.run

      - name: Deploy to Astronomer
        run: astro deploy cmn9i1ttw1oxa01lba0kjr6gt --force

  notify-success:
    name: Slack Notification (Deploy Success)
    runs-on: ubuntu-latest
    needs: deploy
    if: success()
    steps:
      - uses: ravsamhq/notify-slack-action@2.5.0
        with:
          status: success
          notification_title: "{emoji} Deploy Succeeded — {repo}"
          message_format: "{emoji} *{workflow}* deployed `{branch}` by *${{ github.actor }}* (<{commit_url}|`{commit_sha}`>)\n\n<{run_url}|View workflow run>"
          footer: "snow-airflow-dbt CI/CD Pipeline"
          notify_when: "success"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  notify-failure:
    name: Slack Notification (Deploy Failure)
    runs-on: ubuntu-latest
    needs: deploy
    if: failure()
    steps:
      - uses: ravsamhq/notify-slack-action@2.5.0
        with:
          status: failure
          notification_title: "{emoji} Deploy Failed — {repo}"
          message_format: "{emoji} *{workflow}* failed on `{branch}` by *${{ github.actor }}* (<{commit_url}|`{commit_sha}`>)\n\n<{run_url}|View workflow run>"
          footer: "snow-airflow-dbt CI/CD Pipeline"
          notify_when: "failure"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
