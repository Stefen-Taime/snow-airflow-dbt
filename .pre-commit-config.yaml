repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: ["--unsafe"]
      - id: check-added-large-files
        args: ["--maxkb=1000"]

  - repo: https://github.com/sqlfluff/sqlfluff
    rev: 4.1.0
    hooks:
      - id: sqlfluff-lint
        additional_dependencies:
          - sqlfluff-templater-dbt==4.1.0
          - dbt-snowflake>=1.9.0
        args:
          - --dialect=snowflake
        files: ^astro-project/include/dbt_project/models/

  - repo: https://github.com/dbt-checkpoint/dbt-checkpoint
    rev: v1.2.1
    hooks:
      - id: check-model-has-description
        args: ["--manifest", "astro-project/include/dbt_project/target/manifest.json"]
      - id: check-model-has-tests
        args:
          - "--test-cnt"
          - "1"
          - "--manifest"
          - "astro-project/include/dbt_project/target/manifest.json"
      - id: check-column-name-contract
        args: ["--manifest", "astro-project/include/dbt_project/target/manifest.json"]
